<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSCENDENTAL: COMPLETE 40 PATTERNS FULL RESTORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { 
            margin: 0; overflow: hidden; background: #000002; 
            font-family: 'Orbitron', sans-serif; color: #fff; 
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        canvas { display: block; position: absolute; top: 0; z-index: 1; transition: border 0.3s; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            pointer-events: all; text-align: center; background: rgba(3, 2, 8, 0.97); 
            padding: 22px 18px; border: 2px solid rgba(0,255,255,0.2); 
            box-shadow: 0 0 50px rgba(0,255,255,0.12); width: 90%; max-width: 440px; border-radius: 20px;
            display: none;
        }
        
        .tab-container { display: flex; gap: 5px; margin: 12px 0; background: rgba(255,255,255,0.03); padding: 4px; border-radius: 8px; }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: #94a3b8; font-family: 'Orbitron';
            padding: 8px 0; font-size: 0.78rem; font-weight: 700; cursor: pointer; border-radius: 6px; transition: all 0.2s;
        }
        .tab-btn.active { background: rgba(0,255,255,0.15); color: #00ffff; box-shadow: inset 0 0 8px rgba(0,255,255,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .stage-btn { 
            background: linear-gradient(135deg, rgba(12,18,35,0.95), rgba(3,3,15,0.95)); 
            border: 1px solid #1e325c; color: #e2e8f0; padding: 10px 4px; cursor: pointer; 
            transition: all 0.15s ease; font-family: 'Orbitron'; font-size: 0.72rem; border-radius: 8px; font-weight: 700;
        }
        .stage-btn:active { background: #00ffff; color: #000; border-color: #fff; transform: scale(0.96); }
        .infinity-btn {
            grid-column: span 2; background: linear-gradient(135deg, #440066, #110025);
            border: 1px solid #cc00ff; color: #ffaaff; font-weight: 900;
        }
        
        .record-panel {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.06);
            padding: 12px; border-radius: 10px; text-align: left; max-height: 240px; overflow-y: auto;
        }
        .record-item { display: flex; flex-direction: column; font-size: 0.72rem; padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 2px;}
        .record-row-line { display: flex; justify-content: space-between; }
        
        .mode-panel {
            background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px;
        }
        .mode-container { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px; }
        .toggle-label { font-size: 0.75rem; font-weight: 700; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; pointer-events: all; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #27272a; transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        #dodge-mode-toggle:checked + .slider { background-color: #00ffcc; }
        #hard-mode-toggle:checked + .slider { background-color: #ff2244; }
        input:checked + .slider:before { transform: translateX(20px); }

        #hud { position: absolute; top: 20px; left: 20px; text-shadow: 0 0 8px #000; }
        #life-display { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: 900; color: #ff3366; text-shadow: 0 0 5px #ff0000; letter-spacing: 2px; }
        #timer-bar-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); }
        #timer-bar { height: 100%; background: #fff; width: 100%; }
        
        .modal-window { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: all; text-align: center; background: rgba(4,2,12,0.98);
            padding: 30px 20px; border: 2px solid #ff3366; box-shadow: 0 0 35px rgba(255,51,102,0.25);
            border-radius: 16px; width: 84%; max-width: 360px; z-index: 50;
        }
        h1 { font-weight: 900; letter-spacing: 3px; margin: 0; font-size: 1.5rem; }

        .popup-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: all; text-align: center; background: rgba(4, 2, 12, 0.99);
            padding: 35px 25px; border: 2px solid #00ffff; box-shadow: 0 0 40px rgba(0,255,255,0.3);
            border-radius: 16px; width: 80%; max-width: 320px; z-index: 100;
        }
        #init-story-popup { max-width: 380px; width: 84%; z-index: 99; display: none; }
        #init-device-popup { display: none; }

        .lang-select-btn {
            background: #111827; border: 1px solid #00ffff; color: #fff; padding: 12px 0;
            width: 100%; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
            margin: 6px 0; cursor: pointer; border-radius: 8px; transition: all 0.2s;
        }
        .lang-select-btn:active { background: #00ffff; color: #000; }

        #dodge-exit-btn {
            position: absolute; top: 6px; left: 6px; pointer-events: all;
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3); font-size: 9px; font-family: 'Orbitron', sans-serif;
            padding: 2px 5px; border-radius: 4px; cursor: pointer; display: none; z-index: 10;
            transition: all 0.2s;
        }
        #dodge-exit-btn:hover { background: rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.8); }

        #test-mode-modal {
            background: rgba(4, 2, 12, 0.85); border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.15);
        }
        .test-input { background: #111; color: #fff; border: 1px solid #333; padding: 4px; font-family: 'Orbitron'; margin-bottom: 8px; text-align: center; width: 60px; }
        .test-select { background: #111; color: #fff; border: 1px solid #333; padding: 4px; font-family: 'Orbitron'; margin-bottom: 8px; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <button id="dodge-exit-btn" onclick="forceExitDodge()">X EXIT</button>
        <div id="life-display" style="display:none;"></div>

        <div id="init-lang-popup" class="popup-panel">
            <h2 style="font-size:1.1rem; margin-top:0; letter-spacing:1px; color:#00ffff;">SELECT LANGUAGE</h2>
            <button class="lang-select-btn" onclick="selectInitialLanguage('ko')">한국어 (KO)</button>
            <button class="lang-select-btn" onclick="selectInitialLanguage('en')">ENGLISH (EN)</button>
        </div>

        <div id="init-device-popup" class="popup-panel">
            <h2 id="device-title" style="font-size:1.1rem; margin-top:0; letter-spacing:1px; color:#00ffff;"></h2>
            <button class="lang-select-btn" id="btn-device-mobile" onclick="selectDevice('mobile')"></button>
            <button class="lang-select-btn" id="btn-device-pc" onclick="selectDevice('pc')"></button>
        </div>

        <div id="init-story-popup" class="popup-panel">
            <h1 id="story-title" style="background: linear-gradient(45deg, #00ffff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></h1>
            <p id="story-desc" style="font-size: 0.8rem; line-height: 1.6; color: #cbd5e1; margin: 20px 0; text-align: left; word-break: keep-all;"></p>
            <button class="stage-btn" id="story-confirm-btn" style="border-color: #00ffff; width: 140px;" onclick="closeStoryAndShowMain()"></button>
        </div>

        <div id="hud">
            <div id="cur-stage-name" style="font-size: 1.15rem; font-weight: 900; letter-spacing: 1px;">SELECT DIMENSION</div>
            <div id="cur-pattern-info" style="color: #00ffff; font-size: 0.78rem; margin-top: 3px; font-weight: 700;">STANDBY</div>
            <div id="dodge-hit-counter" style="color: #00ffcc; font-size: 0.85rem; margin-top: 3px; font-weight: 900; display: none;">🎯 DODGE HIT: 0</div>
        </div>
        <div id="timer-bar-bg"><div id="timer-bar"></div></div>

        <div id="overlay">
            <h1 style="background: linear-gradient(45deg, #00ffff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TRANSCENDENTAL</h1>
            <p id="main-subtitle" style="font-size: 0.62rem; color: #64748b; margin: 2px 0 8px 0; font-weight: 700;"></p>
            
            <div class="tab-container">
                <button class="tab-btn active" id="tab-play-btn" onclick="switchTab('play')"></button>
                <button class="tab-btn" id="tab-record-btn" onclick="switchTab('record'); renderRecordBoard();"></button>
            </div>

            <div id="tab-play" class="tab-content active">
                <div class="mode-panel">
                    <div class="mode-container">
                        <span class="toggle-label" id="label-dodge-mode" style="color: #00ffcc;"></span>
                        <label class="switch"><input type="checkbox" id="dodge-mode-toggle" checked><span class="slider"></span></label>
                    </div>
                    <div class="mode-container">
                        <span class="toggle-label" id="label-hard-mode" style="color: #ff3355;"></span>
                        <label class="switch"><input type="checkbox" id="hard-mode-toggle"><span class="slider"></span></label>
                    </div>
                </div>

                <div class="stage-grid">
                    <button class="stage-btn" onclick="startGame(0, false)" style="border-color:#555;">0<br><span style="font-size:0.58rem;color:#aaa;">VOID</span></button>
                    <button class="stage-btn" onclick="startGame(1, false)" style="border-color:#00ffcc;">1<br><span style="font-size:0.58rem;color:#00ffcc;">PRIME</span></button>
                    <button class="stage-btn" onclick="startGame(2, false)" style="border-color:#ffff00;">10<br><span style="font-size:0.58rem;color:#ffff00;">ORDER</span></button>
                    <button class="stage-btn" onclick="startGame(3, false)" style="border-color:#ffaa00;">100<br><span style="font-size:0.58rem;color:#ffaa00;">CENTUM</span></button>
                    <button class="stage-btn" onclick="startGame(4, false)" style="border-color:#ff5500;">10000<br><span style="font-size:0.58rem;color:#ff5500;">MYRIAD</span></button>
                    <button class="stage-btn" onclick="startGame(5, false)" style="border-color:#ff00ff;">10^10<br><span style="font-size:0.58rem;color:#ff00ff;">GALAXY</span></button>
                    <button class="stage-btn" onclick="startGame(6, false)" style="border-color:#ff3366;">1e21<br><span style="font-size:0.58rem;color:#ff3366;">ZETTA</span></button>
                    <button class="stage-btn" onclick="startGame(7, false)" style="border-color:#00ffff;">1e308<br><span style="font-size:0.0ffff;">LIMIT</span></button>
                    <button class="stage-btn infinity-btn" id="btn-infinity-mode" onclick="startGame(-1, true)"></button>
                </div>
            </div>

            <div id="tab-record" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <div style="font-size:0.8rem; font-weight:900; color:#ffaa00;" id="label-sector-board"></div>
                    <div>
                        <button class="stage-btn" style="padding:2px 8px; font-size:0.6rem; border-color:#00ffff; background:rgba(0,255,255,0.1); margin-right:5px;" onclick="openTestMode()">테스트 모드</button>
                        <button class="stage-btn" style="padding:2px 8px; font-size:0.6rem; border-color:#ff3333;" id="btn-wipe-data" onclick="clearAllData()"></button>
                    </div>
                </div>
                <div class="record-panel" id="record-board-target"></div>
            </div>
        </div>

        <div id="test-mode-modal" class="modal-window">
            <h2 style="color:#00ffff; margin-top:0; font-size: 1.2rem;">TEST PATTERN</h2>
            <div style="text-align: left; padding-left: 20px;">
                <label style="font-size:0.8rem; color:#aaa;">MODE:</label> 
                <select id="test-mode-select" class="test-select">
                    <option value="normal">NORMAL</option>
                    <option value="hard">HARD</option>
                </select><br>
                <label style="font-size:0.8rem; color:#aaa;">STAGE (0~7):</label> 
                <input type="number" id="test-stage-input" class="test-input" min="0" max="7" value="0"><br>
                <label style="font-size:0.8rem; color:#aaa;">PATTERN (0~4):</label> 
                <input type="number" id="test-pattern-input" class="test-input" min="0" max="4" value="0"><br>
            </div>
            <button class="stage-btn" style="margin-top:15px; width:100%; border-color:#00ffcc;" onclick="startTestMode()">START TEST</button>
            <button class="stage-btn" style="margin-top:5px; width:100%; border-color:#ff3366;" onclick="closeTestMode()">CANCEL</button>
        </div>

        <div id="continue-confirm" class="modal-window">
            <h1 style="color: #00ffff;" id="popup-clear-title">STAGE CLEAR</h1>
            <p id="clear-popup-desc" style="font-size: 0.85rem; color: #ccc; margin: 12px 0;"></p>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <button class="stage-btn" style="border-color: #00ffcc; width: 100px;" id="btn-clear-continue" onclick="continueEndless()"></button>
                <button class="stage-btn" style="border-color: #ff3366; width: 100px;" id="btn-clear-menu" onclick="showMain()"></button>
            </div>
        </div>

        <div id="game-over" class="modal-window">
            <h1 id="game-over-title" style="color: #ff3366;">SYSTEM CRASH</h1>
            <p id="survival-result" style="font-size: 0.9rem; color: #cbd5e1; margin-top: 8px; font-weight: 700; line-height: 1.4; white-space: pre-line;"></p>
            <button class="stage-btn" style="margin-top: 15px; width: 140px; border-color: #00ffff;" id="btn-over-menu" onclick="showMain()"></button>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let gameLang = 'ko';
let deviceMode = 'pc';

const LANG_PACK = {
    ko: {
        deviceTitle: "환경 모드 선택",
        deviceMobile: "모바일 환경 (PC 화면 제한)",
        devicePC: "PC 환경 (전체 화면 적용)",
        storyTitle: "SYSTEM INITIALIZE",
        storyDesc: "차원 균열 프로토콜이 활성화되었습니다. 당신은 연산 구조 붕괴로 인해 무한히 사방에서 쏟아지는 수치 그리드 데이터를 회피하고 코어를 보존해야 합니다. 8개의 차원 영역에 걸쳐 다중 중첩되는 시스템 간섭 속에서 한계 데이터 버퍼를 견뎌내십시오.",
        storyConfirm: "접속 개시",
        mainSubtitle: "8개 차원 총 40개 고유 스택 패턴 시스템 완전 복구 완료",
        playTab: "🎮 PLAY GAME",
        recordTab: "🏆 RECORDS",
        dodgeLabel: "🎯 DODGE MODE (피격 영구 기록 반영)",
        hardLabel: "💀 HARD MODE (창의적 40개 개조 시퀀스)",
        infBtn: "🚀 INFINITY MODE<br><span style='font-size:0.6rem;color:#ffccff;'>40 PATTERNS FULL RANDOM CHAOS STACK</span>",
        sectorBoard: "PERMANENT SECTOR BOARD",
        wipeBtn: "파쇄",
        standby: "대기 모드",
        wipeConfirm: "모든 타임 어택 및 돋지 모드 기록을 완전 파쇄하시겠습니까?",
        clearDescNormal: "60초 클리어 완수! 데이터 칩셋 각인 완료",
        clearDescDodge: "🎯 돋지 모드 완주 성공! 최종 피격 수: [ {hits}회 ]",
        continueBtn: "계속하기",
        menuBtn: "메뉴로",
        survivalPrefix: "생존 시간: ",
        survivalSuffix: "초 기록\n\n(RECORDS 탭에서 최적 피격 스코어 영구 확인 가능!)"
    },
    en: {
        deviceTitle: "SELECT ENVIRONMENT",
        deviceMobile: "MOBILE (Restricted Area)",
        devicePC: "PC (Full Screen)",
        storyTitle: "SYSTEM INITIALIZE",
        storyDesc: "Dimensional rift protocols have been initialized. You must evade the numeric grid data cascading infinitely from all directions due to computational layer collapse. Preserve your core and withstand the multi-stacked system interference across 8 dimensional sectors.",
        storyConfirm: "INITIALIZE ACCESS",
        mainSubtitle: "8 Dimensions Total 40 Unique Stack Pattern System Fully Restored",
        playTab: "🎮 PLAY GAME",
        recordTab: "🏆 RECORDS",
        dodgeLabel: "🎯 DODGE MODE (PERMANENT HIT REGISTERED)",
        hardLabel: "💀 HARD MODE (CREATIVE 40 MODIFIED SEQUENCE)",
        infBtn: "🚀 INFINITY MODE<br><span style='font-size:0.6rem;color:#ffccff;'>40 PATTERNS FULL RANDOM CHAOS STACK</span>",
        sectorBoard: "PERMANENT SECTOR BOARD",
        wipeBtn: "WIPE",
        standby: "STANDBY",
        wipeConfirm: "Do you want to completely wipe all time attack and dodge mode records?",
        clearDescNormal: "60s Clear Completed! Data Chipset Engraving Finished",
        clearDescDodge: "🎯 Dodge Mode Completed! Final Hits: [ {hits} HITS ]",
        continueBtn: "CONTINUE",
        menuBtn: "MAIN MENU",
        survivalPrefix: "Survival Time: ",
        survivalSuffix: "s Recorded\n\n(Check your optimal hit score permanently in RECORDS tab!)"
    }
};

const STAGES = [
    { name: "0 : VOID (공허)", color: "#8c8c8c" },
    { name: "1 : PRIME (기원)", color: "#00ffcc" },
    { name: "10 : ORDER (대칭)", color: "#ffff00" },
    { name: "100 : CENTUM (매트릭스)", color: "#ffaa00" },
    { name: "10000 : MYRIAD (구체)", color: "#ff5500" },
    { name: "10^10 : GALAXY (은하)", color: "#ff00ff" },
    { name: "1e21 : ZETTA (장막)", color: "#ff3366" },
    { name: "1e308 : LIMIT (종말)", color: "#00ffff" }
];

let player = { x: 0, y: 0, r: 5 };
let playerHistory = []; 
let bullets = [];
let glassShards = []; 
let cosmicDust = [];  

let stageIdx = 0;
let stackCount = 1; 
let startTime = 0;
let isRunning = false;
let isPausedForChoice = false;
let isInfinityMode = false;
let hasPrompted60s = false;
let frame = 0;
let lastTouch = { x: 0, y: 0 };
let infinityPatternPool = [];

let isDodgeMode = false;
let isHardMode = false;
let dodgeHitCount = 0;
let playerLife = 3;
let pInvincibility = 0;

let isTestMode = false;
let testStageParam = 0;
let testPatternParam = 0;

let gameRecords = JSON.parse(localStorage.getItem('trans_records_v4_2026')) || {};

// PC 난이도 보정 상수 (PC일때 1.5배 스피드 및 생성량 강화)
function getPcMult() { return deviceMode === 'pc' ? 1.5 : 1.0; }

function selectInitialLanguage(lang) {
    gameLang = lang;
    document.getElementById('init-lang-popup').style.display = 'none';
    
    document.getElementById('device-title').innerText = LANG_PACK[gameLang].deviceTitle;
    document.getElementById('btn-device-mobile').innerText = LANG_PACK[gameLang].deviceMobile;
    document.getElementById('btn-device-pc').innerText = LANG_PACK[gameLang].devicePC;
    
    document.getElementById('init-device-popup').style.display = 'block';
}

function selectDevice(mode) {
    deviceMode = mode;
    document.getElementById('init-device-popup').style.display = 'none';
    resize();
    
    document.getElementById('story-title').innerText = LANG_PACK[gameLang].storyTitle;
    document.getElementById('story-desc').innerText = LANG_PACK[gameLang].storyDesc;
    document.getElementById('story-confirm-btn').innerText = LANG_PACK[gameLang].storyConfirm;
    
    document.getElementById('init-story-popup').style.display = 'block';
}

function closeStoryAndShowMain() {
    document.getElementById('init-story-popup').style.display = 'none';
    applyLanguageToUI();
    document.getElementById('overlay').style.display = 'block';
}

function applyLanguageToUI() {
    const p = LANG_PACK[gameLang];
    document.getElementById('main-subtitle').innerText = p.mainSubtitle;
    document.getElementById('tab-play-btn').innerText = p.playTab;
    document.getElementById('tab-record-btn').innerText = p.recordTab;
    document.getElementById('label-dodge-mode').innerText = p.dodgeLabel;
    document.getElementById('label-hard-mode').innerText = p.hardLabel;
    document.getElementById('btn-infinity-mode').innerHTML = p.infBtn;
    document.getElementById('label-sector-board').innerText = p.sectorBoard;
    document.getElementById('btn-wipe-data').innerText = p.wipeBtn;
    document.getElementById('cur-pattern-info').innerText = p.standby;
    document.getElementById('btn-clear-continue').innerText = p.continueBtn;
    document.getElementById('btn-clear-menu').innerText = p.menuBtn;
    document.getElementById('btn-over-menu').innerText = p.menuBtn;
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    if(tab === 'play') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-play').classList.add('active');
    } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-record').classList.add('active');
    }
}

function renderRecordBoard() {
    const target = document.getElementById('record-board-target');
    target.innerHTML = '';
    
    STAGES.forEach((st, idx) => {
        let nTimeKey = `stage_${idx}_normal_time`;
        let hTimeKey = `stage_${idx}_hard_time`;
        let nDodgeKey = `stage_${idx}_normal_dodge`;
        let hDodgeKey = `stage_${idx}_hard_dodge`;
        
        let nt = gameRecords[nTimeKey] ? gameRecords[nTimeKey].toFixed(2) + 's' : '---';
        let ht = gameRecords[hTimeKey] ? gameRecords[hTimeKey].toFixed(2) + 's' : '---';
        let nd = gameRecords[nDodgeKey] !== undefined ? gameRecords[nDodgeKey] + ' HITS' : '---';
        let hd = gameRecords[hDodgeKey] !== undefined ? gameRecords[hDodgeKey] + ' HITS' : '---';

function initCosmicDust() {

        });

let bgGrid = [];
function initBackground() {
    bgGrid = []; const cols = 12; const rows = 12; 
    for(let i=0; i<=cols; i++) { for(let j=0; j<=rows; j++) { bgGrid.push({ origX: i / cols, origY: j / rows, x: 0, y: 0 }); } }
    initCosmicDust();
}

function updateBackground() {
    bgGrid.forEach(pt => {
        let baseX = pt.origX * canvas.width; let baseY = pt.origY * canvas.height;
        let dx = player.x - baseX; let dy = player.y - baseY; let dist = Math.hypot(dx, dy);
        let force = Math.min(35, 2000 / (dist + 55)); pt.x = baseX - (dx / (dist + 1)) * force; pt.y = baseY - (dy / (dist + 1)) * force;
    });
    cosmicDust.forEach(d => { d.y += d.speed; if(d.y > canvas.height) { d.y = -10; d.x = Math.random() * canvas.width; } });
}

function drawBackground() {
    cosmicDust.forEach(d => { ctx.fillStyle = d.color; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill(); });
    ctx.strokeStyle = 'rgba(0, 220, 255, 0.035)'; ctx.lineWidth = 1.0; const size = Math.sqrt(bgGrid.length);
    for(let i=0; i<size; i++) {
        for(let j=0; j<size; j++) {
            let idx = i * size + j;
            if(j < size - 1) { ctx.beginPath(); ctx.moveTo(bgGrid[idx].x, bgGrid[idx].y); ctx.lineTo(bgGrid[idx+1].x, bgGrid[idx+1].y); ctx.stroke(); }
            if(i < size - 1) { ctx.beginPath(); ctx.moveTo(bgGrid[idx].x, bgGrid[idx].y); ctx.lineTo(bgGrid[idx+size].x, bgGrid[idx+size].y); ctx.stroke(); }
        }
    }
}

function triggerGlassShatter(x, y, color, inertiaVx = 0, inertiaVy = 0) {

    for(let i=0; i<shardCount; i++) {
        let angle = Math.random() * Math.PI * 2; let speed = Math.random() * 3.0 + 1.5; let points = [];
        for(let p=0; p<3; p++) points.push({ dx: Math.cos((Math.PI * 2 / 3) * p)*(Math.random() * 6 + 3), dy: Math.sin((Math.PI * 2 / 3) * p)*(Math.random() * 6 + 3) });
        glassShards.push({ x: x, y: y, vx: Math.cos(angle) * speed + (inertiaVx * 0.4), vy: Math.sin(angle) * speed + (inertiaVy * 0.4), rot: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.2, points: points, color: color || '#00ffff', alpha: 1.0, decay: 0.025 });
    }
}

class PremiumBullet {
    constructor(x, y, vx, vy, r, color, behavior, p1 = 0, p2 = 0) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.r = r; 
        this.color = color; this.behavior = behavior; this.p1 = p1; this.p2 = p2; this.life = 0;
        this.bounceCount = 0;
    }
    update() {
        this.life++;
        switch(this.behavior) {
            case 'sine_wave': this.x += Math.sin(this.life * 0.05) * this.p1; break;
            case 'cos_wave': this.y += Math.cos(this.life * 0.05) * this.p1; break;
            case 'accelerate': this.vx *= 1.014; this.vy *= 1.014; break;
            
            // 점근 유도 패턴 추가 (블랙홀)
            case 'asymptotic_homing':
                let adx = player.x - this.x; let ady = player.y - this.y;
                let adist = Math.hypot(adx, ady);
                let pull = this.p1 || 0.15; // 당기는 힘
                let maxSpeed = this.p2 || 4.5;
                this.vx += (adx / (adist + 1)) * pull;
                this.vy += (ady / (adist + 1)) * pull;
                let curSpeed = Math.hypot(this.vx, this.vy);
                if(curSpeed > maxSpeed) {
                    this.vx = (this.vx / curSpeed) * maxSpeed;
                    this.vy = (this.vy / curSpeed) * maxSpeed;
                }
                break;

            case 'hard_bend_two':
                if(this.life === 24 || this.life === 52) {
                    let dx = player.x - this.x; let dy = player.y - this.y; let d = Math.hypot(dx, dy);
                    this.vx = (dx / (d + 1)) * this.p1; this.vy = (dy / (d + 1)) * this.p1;
                }
                break;
            case 'void_cross_boom':
                if(this.life === 48) {
                    this.behavior = 'normal'; this.color = '#ff0055'; this.r = 4;
                    let dx = player.x - this.x; let dy = player.y - this.y; let d = Math.hypot(dx, dy);
                    this.vx = (dx/(d+1))*2.8; this.vy = (dy/(d+1))*2.8;
                }
                break;
            case 'void_sink_black':
                let vdx = canvas.width/2 - this.x; let vdy = canvas.height/2 - this.y; let vd = Math.hypot(vdx, vdy);
                this.x += (vdx/(vd+1))*0.4; this.y += (vdy/(vd+1))*0.4;
                break;

            case 'hard_vortex_sink':
                let curDist = Math.hypot(this.x - this.p1, this.y - this.p2);
                if(curDist > 5) {
                    let angle = Math.atan2(this.y - this.p2, this.x - this.p1) + 0.03;
                    let nextRadius = curDist - 0.76;
                    this.x = this.p1 + Math.cos(angle) * nextRadius;
                    this.y = this.p2 + Math.sin(angle) * nextRadius;
                    return; 
                }
                break;
            case 'prime_blade_in':
                let bDist = Math.hypot(this.x - this.p1, this.y - this.p2);
                let bAngle = Math.atan2(this.y - this.p2, this.x - this.p1) - 0.04;
                this.x = this.p1 + Math.cos(bAngle) * (bDist - 1.12);
                this.y = this.p2 + Math.sin(bAngle) * (bDist - 1.12);
                return;
            case 'prime_return_ring':
                if(this.life > 45 && this.life < 85) { this.vx *= -0.85; this.vy *= -0.85; this.behavior = 'normal'; }
                break;

            case 'hard_bounce_laser':
                if(this.bounceCount < 2) {
                    if(this.x < 8 || this.x > canvas.width - 8 || this.y < 8 || this.y > canvas.height - 8) {
                        let dx = player.x - this.x; let dy = player.y - this.y; let d = Math.hypot(dx, dy);
                        this.vx = (dx / (d + 1)) * 2.72; this.vy = (dy / (d + 1)) * 2.72;
                        this.bounceCount++; this.color = '#ff00ff';
                    }
                }
                break;
            case 'order_mirror_chase':
                if(this.life % 30 === 0) {
                    let tx = canvas.width - player.x; let ty = canvas.height - player.y;
                    let dx = tx - this.x; let dy = ty - this.y; let d = Math.hypot(dx, dy);
                    this.vx = (dx/(d+1))*2.0; this.vy = (dy/(d+1))*2.0;
                }
                break;

            case 'hard_blackhole':
                if(this.life > 30 && this.life < 65) {
                    let dx = canvas.width/2 - this.x; let dy = canvas.height/2 - this.y; let d = Math.hypot(dx, dy);
                    this.x += (dx/(d+1))*3.2; this.y += (dy/(d+1))*3.2;
                } else if(this.life === 65) {
                    let dx = player.x - this.x; let dy = player.y - this.y; let d = Math.hypot(dx, dy);
                    this.vx = (dx/(d+1))*3.36; this.vy = (dy/(d+1))*3.36;
                }
                break;
            case 'lim_stop_go':
                if(this.life === 30) { this.p1 = this.vx; this.p2 = this.vy; this.vx = 0; this.vy = 0; }
                if(this.life === 60) { this.vx = this.p1 * 2.0; this.vy = this.p2 * 2.0; }
                break;
            case 'ring_collapse':
                let rdx = this.x - this.p1; let rdy = this.y - this.p2; let rdist = Math.hypot(rdx, rdy);
                if(rdist > 2) { this.x -= (rdx/rdist)*1.52; this.y -= (rdy/rdist)*1.52; }
                break;
            case 'shift_angle_run':
                const rx = this.vx * Math.cos(this.p1) - this.vy * Math.sin(this.p1);
                this.vy = this.vx * Math.sin(this.p1) + this.vy * Math.cos(this.p1); this.vx = rx;
                break;
            case 'brake_aim':
                if (this.life === 30) { 
                    this.vx = 0; this.vy = 0; 
                }
                if (this.life === 60) {
                    let dx = player.x - this.x; let dy = player.y - this.y; let d = Math.hypot(dx, dy);
                    this.vx = (dx / (d + 1)) * this.p1; this.vy = (dy / (d + 1)) * this.p1;
                }
                break;
        }
        this.x += this.vx; this.y += this.vy;
    }
    draw() {
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 0.5; ctx.stroke();
    }
}

function processEliteStackEngine() {
    frame++; const elapsed = (Date.now() - startTime) / 1000;
    let modeTag = isHardMode ? "💀 HARD " : (isDodgeMode ? "🎯 DODGE " : "");

    if (isTestMode) {
        document.getElementById('cur-stage-name').innerText = modeTag + "TEST PATTERN";
        document.getElementById('cur-pattern-info').innerText = `TESTING | STAGE: ${testStageParam} | PAT: ${testPatternParam} | TIME: ${elapsed.toFixed(2)}s`;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').style.backgroundColor = "#00ffff";
        spawnLayerPattern(testStageParam, testPatternParam);
    } else if (isInfinityMode) {
        document.getElementById('cur-stage-name').innerText = modeTag + "INFINITY";
        stackCount = Math.min(5, Math.floor(elapsed / 10) + 1); 
        while(infinityPatternPool.length < stackCount) addRandomPatternToPool();
        
        let label = isHardMode ? "💀 HARD STACK" : "🚀 CHAOS STACK";
        document.getElementById('cur-pattern-info').innerText = `${label}: ${stackCount} | TIME: ${elapsed.toFixed(2)}s`;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').style.backgroundColor = isHardMode ? "#ff2244" : "#cc00ff";

        for(let p of infinityPatternPool) { spawnLayerPattern(p.stage, p.pId); }
    } else {
        stackCount = Math.min(5, Math.floor(elapsed / 12) + 1);
        
        // 지수적 Dim 표시 로직
        let displayDim = STAGES[stageIdx].name.split(' ')[0];
        if (stageIdx === 7) {
            let prog = Math.min(1.0, elapsed / 60);
            displayDim = "1e" + Math.floor(308 * prog);
            if (prog === 0) displayDim = "0";
            if (prog >= 1) displayDim = "1e308";
        }
        document.getElementById('cur-stage-name').innerText = modeTag + displayDim + " DIM";
        document.getElementById('cur-stage-name').style.color = isHardMode ? "#ff3355" : STAGES[stageIdx].color;

        document.getElementById('cur-pattern-info').innerText = isDodgeMode ? `🎯 DODGE TRACKING | TIME: ${elapsed.toFixed(2)}s / 60s` : `ACTIVE CHAOS STACK: ${stackCount} / 5 | TIME: ${elapsed.toFixed(2)}s`;
        document.getElementById('timer-bar').style.width = (100 - ((elapsed % 12) / 12 * 100)) + "%";
        document.getElementById('timer-bar').style.backgroundColor = STAGES[stageIdx].color;

        for(let i=0; i<stackCount; i++) { spawnLayerPattern(stageIdx, i); }

        if (elapsed >= 60 && !hasPrompted60s) {
            hasPrompted60s = true; isPausedForChoice = true;
            document.getElementById('dodge-exit-btn').style.display = 'none';
            
            if (isDodgeMode) {
                document.getElementById('clear-popup-desc').innerText = LANG_PACK[gameLang].clearDescDodge.replace("{hits}", dodgeHitCount);
            } else {
                document.getElementById('clear-popup-desc').innerText = LANG_PACK[gameLang].clearDescNormal;
            }
            
            savePermanentScore(60.00, dodgeHitCount);
            document.getElementById('continue-confirm').style.display = 'block';
        }
    }
}

function savePermanentScore(finalTime, currentDodgeHits) {
    if(isTestMode) return;
    
    let baseKey = isInfinityMode ? 'inf' : `stage_${stageIdx}`;
    let subKey = isHardMode ? 'hard' : 'normal';
    
    let timeKey = `${baseKey}_${subKey}_time`;
    let dodgeKey = `${baseKey}_${subKey}_dodge`;
    
    let prevTime = gameRecords[timeKey] || 0;
    if(finalTime > prevTime) { gameRecords[timeKey] = finalTime; }
    
    if(isDodgeMode) {
        let prevDodge = gameRecords[dodgeKey];
        if(prevDodge === undefined || currentDodgeHits < prevDodge) {
            gameRecords[dodgeKey] = currentDodgeHits;
        }
    }
    
    localStorage.setItem('trans_records_v4_2026', JSON.stringify(gameRecords));
}

window.addEventListener('touchstart', e => { if(!isRunning || isPausedForChoice) return; const t = e.touches[0]; lastTouch.x = t.clientX; lastTouch.y = t.clientY; }, { passive: true });
window.addEventListener('touchmove', e => {
    if(!isRunning || isPausedForChoice) return; const t = e.touches[0];
    let sens = isHardMode ? 1.6 : 1.4; const dx = (t.clientX - lastTouch.x) * sens; const dy = (t.clientY - lastTouch.y) * sens;
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x + dx)); player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y + dy));
    lastTouch.x = t.clientX; lastTouch.y = t.clientY;
}, { passive: true });

let isMouseDown = false;

    if(!isPausedForChoice && isRunning) { isMouseDown = true; lastTouch.x = e.clientX; lastTouch.y = e.clientY; } 
});
window.addEventListener('mousemove', e => {
    if(!isRunning || !isMouseDown || isPausedForChoice) return;
    let sens = isHardMode ? 1.45 : 1.3;
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x + (e.clientX - lastTouch.x) * sens));

    lastTouch.x = e.clientX; lastTouch.y = e.clientY;
});
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('mouseleave', () => isMouseDown = false);

function animate() {
    if (!isRunning || isPausedForChoice) return;

    playerHistory.push({ x: player.x, y: player.y });
    if(playerHistory.length > 24) playerHistory.shift(); 

    ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = 'rgba(2, 1, 5, 0.28)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    updateBackground(); drawBackground();
    ctx.globalCompositeOperation = 'screen';
    processEliteStackEngine();

    for(let i = glassShards.length - 1; i >= 0; i--) {
        let s = glassShards[i]; s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed; s.alpha -= s.decay; if(s.alpha <= 0) { glassShards.splice(i, 1); continue; }
        ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot); ctx.fillStyle = s.color; ctx.globalAlpha = s.alpha; ctx.beginPath(); ctx.moveTo(s.points[0].dx, s.points[0].dy);
        for(let p=1; p<s.points.length; p++) ctx.lineTo(s.points[p].dx, s.points[p].dy);
        ctx.closePath(); ctx.fill(); ctx.restore();
    }
    ctx.globalAlpha = 1.0;

    if(pInvincibility > 0) {
        pInvincibility--;
        if(Math.floor(pInvincibility / 5) % 2 === 0) ctx.globalAlpha = 0.3;
    }

    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for(let i = 1; i < playerHistory.length - 1; i++) {
        let ratio = i / playerHistory.length;
        ctx.strokeStyle = isHardMode ? `rgba(255, 34, 68, ${ratio * 0.42})` : `rgba(0, 255, 255, ${ratio * 0.42})`;
        ctx.lineWidth = (isHardMode ? 7 : 11) * ratio; 
        
        ctx.beginPath();
        let p0 = playerHistory[i-1]; let p1 = playerHistory[i]; let p2 = playerHistory[i+1];
        let xc1 = (p0.x + p1.x) / 2; let yc1 = (p0.y + p1.y) / 2; let xc2 = (p1.x + p2.x) / 2; let yc2 = (p1.y + p2.y) / 2;

        if (i === 1) { ctx.moveTo(p0.x, p0.y); ctx.quadraticCurveTo(p1.x, p1.y, xc2, yc2); } 
        else { ctx.moveTo(xc1, yc1); ctx.quadraticCurveTo(p1.x, p1.y, xc2, yc2); }
        ctx.stroke();
    }
    
    let last = playerHistory.length - 1;
    if (last > 1) {
        let ratio = last / playerHistory.length;
        ctx.strokeStyle = isHardMode ? `rgba(255, 34, 68, ${ratio * 0.42})` : `rgba(0, 255, 255, ${ratio * 0.42})`;
        ctx.lineWidth = (isHardMode ? 7 : 11) * ratio;
        ctx.beginPath();
        let pPrev = playerHistory[last-1]; let pLast = playerHistory[last];
        ctx.moveTo((pPrev.x + pLast.x) / 2, (pPrev.y + pLast.y) / 2); ctx.lineTo(pLast.x, pLast.y); ctx.stroke();
    }

    // 플레이어의 현재 속도 (관성 계산용)
    let pVx = 0; let pVy = 0;
    if(playerHistory.length > 1) {
        pVx = playerHistory[last].x - playerHistory[last-1].x;
        pVy = playerHistory[last].y - playerHistory[last-1].y;
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i]; b.update(); b.draw(); const dist = Math.hypot(player.x - b.x, player.y - b.y);
        
        if (dist < player.r + b.r * 0.42) {
            triggerGlassShatter(b.x, b.y, b.color, pVx, pVy); // 관성 적용
            
            if(isDodgeMode || isTestMode) {
                dodgeHitCount++; 
                document.getElementById('dodge-hit-counter').innerText = `🎯 DODGE HIT: ${dodgeHitCount}`;
                bullets.splice(i, 1); continue;
            } else {
                if(pInvincibility <= 0) {
                    playerLife--;
                    updateLifeUI();
                    if(playerLife <= 0) {
                        isRunning = false; ctx.globalCompositeOperation = 'source-over';
                        let finalScore = ((Date.now() - startTime) / 1000);
                        savePermanentScore(finalScore, dodgeHitCount);
                        document.getElementById('dodge-exit-btn').style.display = 'none';

                        let modeTitle = isHardMode ? "💀 HARD SYSTEM CRASH" : "SYSTEM CRASH";
                        document.getElementById('game-over-title').innerText = modeTitle;
                        document.getElementById('survival-result').innerText = LANG_PACK[gameLang].survivalPrefix + finalScore.toFixed(2) + LANG_PACK[gameLang].survivalSuffix;
                        document.getElementById('game-over').style.display = 'block'; return;
                    } else {
                        pInvincibility = 90; // 피격 시 1.5초 무적
                    }
                }
                bullets.splice(i, 1); continue;
            }
        }
        if (b.x < -60 || b.x > canvas.width + 60 || b.y < -60 || b.y > canvas.height + 60 || b.life > 1100) { bullets.splice(i, 1); }
    }

    ctx.fillStyle = isHardMode ? '#ff1144' : '#00ffff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r - 0.5, 0, Math.PI * 2); ctx.fill();
    
    ctx.globalAlpha = 1.0;
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
